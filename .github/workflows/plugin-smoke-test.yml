name: plugin smoke test

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "plugins/**"
      - "scripts/smoke-test.sh"
      - "CLAUDE.md"
      - ".github/workflows/plugin-smoke-test.yml"
  pull_request:
    paths:
      - "data/**"
      - "plugins/**"
      - "scripts/smoke-test.sh"
      - "CLAUDE.md"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

      - name: Check data freshness (advisory only)
        run: bash scripts/check-data-freshness.sh || true
